language: python
python:
  - "2.6"
  - "2.7"

# Use new Travis infrastructure (Docker can't sudo yet)
sudo: false

# Install coveralls to obtain code coverage
install:
  - "pip install coveralls"

before_install:
  # Need this for the git tests to succeed.
  - git config --global user.email "spack@example.com"
  - git config --global user.name "Test User"
  # Need this to be able to compute the list of changed files
  - git fetch origin develop:develop

script:
  - . share/spack/setup-env.sh
  # Run unit tests with code coverage
  - coverage run --source lib bin/spack test
  # Checks if the file that have been changed are pep8 conformant
  - PEP8_FILE_LIST=`git diff develop... --name-only | grep .py`
  - if [ ${PEP8_FILE_LIST} ] ; then pep8 --max-line-length=120 ${PEP8_FILE_LIST} ; fi


after_success:
  - coveralls

notifications:
  email:
    recipients:
      - massimiliano.culpo@gmail.com
    on_success: change
    on_failure: always
