language: python
python:
  - "2.6"
  - "2.7"

# Use new Travis infrastructure (Docker can't sudo yet)
sudo: false

# Install coveralls to obtain code coverage
install:
  - "pip install tox-travis"

script:
  - . share/spack/setup-env.sh
  - tox

after_success:
  - coveralls

notifications:
  email:
    recipients:
      - massimiliano.culpo@gmail.com
    on_success: change
    on_failure: always
